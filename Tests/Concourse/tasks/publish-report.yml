platform: linux

image_resource:
  type: registry-image
  source:
    repository: curlimages/curl
    tag: "8.12.1"

inputs:
  - name: xray-report-artifact
  - name: repo

params:
  ARTIFACT_INTERNAL_BASE_URL: http://10.80.0.1:8081
  ARTIFACT_PUBLIC_BASE_URL: http://localhost:8081

outputs:
  - name: report-metadata
  - name: published-report

run:
  # The curl image defaults to an unprivileged user, but Concourse creates
  # declared output directories as root before starting the task process.
  user: root
  path: sh
  args:
    - repo/Tests/Concourse/scripts/publish-report.sh

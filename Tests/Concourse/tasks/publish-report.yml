platform: linux

image_resource:
  type: registry-image
  source:
    repository: curlimages/curl
    tag: "8.12.1"

inputs:
  - name: xray-report-artifact
  - name: test-results

params:
  SMTP_HOST: ""
  SMTP_PORT: ""
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  EMAIL_FROM: ""
  EMAIL_TO: ""

outputs:
  - name: report-metadata
  - name: published-report

run:
  # The curl image defaults to an unprivileged user, but Concourse creates
  # declared output directories as root before starting the task process.
  user: root
  path: sh
  args:
    # Do not enable shell tracing because this task handles SMTP credentials.
    - -ec
    - |
      report_id="qa-bdd-automation-run-tests-$(date -u +%Y%m%dT%H%M%SZ)"
      internal_report_url="http://10.80.0.1:8081/reports/${report_id}"
      report_url="http://localhost:8081/reports/${report_id}/allure-report.html"

      mkdir -p report-metadata published-report
      cp xray-report-artifact/allure-report.html published-report/allure-report.html

      curl --fail --show-error \
        --request POST \
        --header "Content-Type: application/gzip" \
        --data-binary @xray-report-artifact/allure-report-for-xray.tar.gz \
        "$internal_report_url"

      curl --fail --show-error \
        --output /dev/null \
        "${internal_report_url}/allure-report.html"

      echo "$report_id" | tee report-metadata/report-id.txt
      echo "$report_url" | tee report-metadata/report-url.txt
      echo "Published portable Allure HTML report: $report_url"

      apk add --no-cache ca-certificates msmtp

      smtp_password="$SMTP_PASSWORD"
      if [ "$SMTP_HOST" = "smtp.gmail.com" ]; then
        smtp_password="$(printf '%s' "$SMTP_PASSWORD" | tr -d '[:space:]')"
      fi

      umask 077
      smtp_config="$(mktemp)"
      email_message="$(mktemp)"
      trap 'rm -f "$smtp_config" "$email_message"' EXIT HUP INT TERM

      cat > "$smtp_config" <<EOF
      defaults
      auth on
      tls on
      tls_starttls on
      tls_trust_file /etc/ssl/certs/ca-certificates.crt

      account concourse
      host $SMTP_HOST
      port $SMTP_PORT
      user $SMTP_USERNAME
      password $smtp_password
      from $EMAIL_FROM

      account default : concourse
      EOF

      test_exit_code="$(cat test-results/test-exit-code.txt)"
      if [ "$test_exit_code" -eq 0 ]; then
        test_status="PASSED"
      else
        test_status="FAILED"
      fi

      mime_boundary="allure-report-$(date +%s)"
      {
        echo "From: $EMAIL_FROM"
        echo "To: $EMAIL_TO"
        echo "Subject: [Concourse] QA BDD tests $test_status"
        echo "MIME-Version: 1.0"
        echo "Content-Type: multipart/mixed; boundary=$mime_boundary"
        echo
        echo "--$mime_boundary"
        echo "Content-Type: text/plain; charset=UTF-8"
        echo
        echo "QA BDD automation test status: $test_status"
        echo
        cat test-results/test-summary.txt
        echo
        echo "Allure HTML report: $report_url"
        echo "A portable copy is attached as allure-report.html."
        echo
        echo "--$mime_boundary"
        echo 'Content-Type: text/html; charset=UTF-8; name="allure-report.html"'
        echo 'Content-Disposition: attachment; filename="allure-report.html"'
        echo "Content-Transfer-Encoding: base64"
        echo
        base64 xray-report-artifact/allure-report.html
        echo
        echo "--$mime_boundary--"
      } > "$email_message"

      if ! msmtp --file="$smtp_config" "$EMAIL_TO" < "$email_message"; then
        echo "Warning: report published, but email delivery failed." >&2
      fi

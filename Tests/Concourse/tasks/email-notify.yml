platform: linux

image_resource:
  type: registry-image
  source:
    repository: mcr.microsoft.com/dotnet/sdk
    tag: "8.0"

inputs:
  - name: test-results
  - name: report-metadata
  - name: allure-report

params:
  SMTP_HOST: ""
  SMTP_PORT: ""
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  EMAIL_FROM: ""
  EMAIL_TO: ""

run:
  path: sh
  args:
    # Do not enable shell tracing: this task handles SMTP credentials.
    - -ec
    - |
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends ca-certificates msmtp

      # Google displays App Passwords in groups separated by spaces, while
      # SMTP authentication expects the underlying 16-character value.
      smtp_password="$(printf '%s' "$SMTP_PASSWORD" | tr -d '[:space:]')"

      cat > /tmp/msmtprc <<EOF
      defaults
      auth on
      tls on
      tls_starttls on
      tls_trust_file /etc/ssl/certs/ca-certificates.crt
      account concourse
      host ${SMTP_HOST}
      port ${SMTP_PORT}
      user ${SMTP_USERNAME}
      password ${smtp_password}
      from ${EMAIL_FROM}
      account default : concourse
      EOF
      chmod 600 /tmp/msmtprc

      test_exit_code="$(cat test-results/test-exit-code.txt)"
      if [ "$test_exit_code" -eq 0 ]; then
        test_status="PASSED"
      else
        test_status="FAILED"
      fi

      report_url="$(cat report-metadata/report-url.txt)"
      report_file="allure-report/index.html"
      if [ ! -f "$report_file" ]; then
        echo "Portable Allure report was not generated: $report_file" >&2
        exit 1
      fi

      mime_boundary="allure-report-$(date +%s)"

      {
        echo "From: ${EMAIL_FROM}"
        echo "To: ${EMAIL_TO}"
        echo "Subject: [Concourse] QA BDD tests ${test_status}"
        echo "MIME-Version: 1.0"
        echo "Content-Type: multipart/mixed; boundary=${mime_boundary}"
        echo
        echo "--${mime_boundary}"
        echo "Content-Type: text/plain; charset=UTF-8"
        echo
        echo "QA BDD automation test status: ${test_status}"
        echo
        cat test-results/test-summary.txt
        echo
        echo "The portable Allure report is attached as allure-report.html."
        echo "Allure HTML report: ${report_url}"
        echo
        echo "--${mime_boundary}"
        echo 'Content-Type: text/html; charset=UTF-8; name="allure-report.html"'
        echo 'Content-Disposition: attachment; filename="allure-report.html"'
        echo "Content-Transfer-Encoding: base64"
        echo
        base64 "$report_file"
        echo
        echo "--${mime_boundary}--"
      } | msmtp --file=/tmp/msmtprc "${EMAIL_TO}"

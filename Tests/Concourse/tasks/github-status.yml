platform: linux

image_resource:
  type: registry-image
  source:
    repository: alpine
    tag: "3.20"

inputs:
  - name: repo

params:
  GITHUB_TOKEN: ""
  GITHUB_STATUS_STATE: ""
  GITHUB_STATUS_CONTEXT: qa-bdd-automation/pr-deployment
  GITHUB_STATUS_DESCRIPTION: ""
  GITHUB_STATUS_TARGET_URL: ""

run:
  path: sh
  args:
    - repo/Tests/Concourse/scripts/github-status.sh

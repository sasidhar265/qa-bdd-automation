resources:
  - name: repo
    type: git
    source:
      uri: https://github.com/sasidhar265/qa-bdd-automation.git
      branch: main
      username: sasidhar265@gmail.com
      password: ((github_token))

jobs:
  - name: run-tests
    plan:
      - get: repo
        trigger: true
        version: every

      - do:
          - task: check-source-version
            config:
              platform: linux
              image_resource:
                type: registry-image
                source:
                  repository: alpine/git
                  tag: latest
              inputs:
                - name: repo
              outputs:
                - name: source-metadata
              run:
                path: sh
                args:
                  - -exc
                  - |
                    cd repo
                    {
                      echo "Repository: $(git config --get remote.origin.url)"
                      echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
                      echo "Commit: $(git rev-parse HEAD)"
                      echo "Short commit: $(git rev-parse --short HEAD)"
                      echo "Author: $(git show -s --format='%an <%ae>' HEAD)"
                      echo "Commit date: $(git show -s --format='%ci' HEAD)"
                      echo "Commit subject: $(git show -s --format='%s' HEAD)"
                    } | tee ../source-metadata/source-version.txt
                    git show --stat --oneline --decorate --no-renames HEAD > ../source-metadata/commit-summary.txt

          - task: install-test-dependencies
            config:
              platform: linux
              image_resource:
                type: registry-image
                source:
                  repository: mcr.microsoft.com/dotnet/sdk
                  tag: "8.0"
              inputs:
                - name: repo
              outputs:
                - name: restored-repo
              run:
                path: bash
                args:
                  - -exc
                  - |
                    cp -a repo/. restored-repo/
                    cd restored-repo
                    export NUGET_PACKAGES="$PWD/.nuget/packages"
                    apt-get update
                    apt-get install -y --no-install-recommends curl ca-certificates tar gzip
                    dotnet restore QaAutomation.sln
                    mkdir -p .tools
                    curl -fsSL https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.29.0/allure-commandline-2.29.0.tgz \
                      -o .tools/allure-commandline.tgz
                    tar -xzf .tools/allure-commandline.tgz -C .tools
                    mv .tools/allure-2.29.0 .tools/allure
                    .tools/allure/bin/allure --version

          - task: check-build-status
            config:
              platform: linux
              image_resource:
                type: registry-image
                source:
                  repository: mcr.microsoft.com/dotnet/sdk
                  tag: "8.0"
              inputs:
                - name: restored-repo
              outputs:
                - name: built-repo
                - name: build-status
              run:
                path: bash
                args:
                  - -exc
                  - |
                    cp -a restored-repo/. built-repo/
                    cd built-repo
                    export NUGET_PACKAGES="$PWD/.nuget/packages"
                    set +e
                    dotnet build QaAutomation.sln --no-restore | tee ../build-status/build.log
                    build_exit_code=${PIPESTATUS[0]}
                    set -e
                    if [ "$build_exit_code" -eq 0 ]; then
                      echo "Build status: PASSED" | tee ../build-status/build-status.txt
                    else
                      echo "Build status: FAILED" | tee ../build-status/build-status.txt
                      exit "$build_exit_code"
                    fi

          - task: run-tests-and-summarize-results
            config:
              platform: linux
              image_resource:
                type: registry-image
                source:
                  repository: mcr.microsoft.com/dotnet/sdk
                  tag: "8.0"
              inputs:
                - name: built-repo
              outputs:
                - name: test-results
                - name: allure-report
              run:
                path: bash
                args:
                  - -exc
                  - |
                    cd built-repo
                    export NUGET_PACKAGES="$PWD/.nuget/packages"
                    export PATH="$PWD/.tools/allure/bin:$PATH"
                    apt-get update
                    apt-get install -y --no-install-recommends default-jre chromium
                    export CHROME_BIN="$(command -v chromium || command -v chromium-browser)"
                    export CHROME_HEADLESS=true
                    set +e
                    dotnet test Tests/Tests.csproj \
                      --no-build \
                      --logger "trx;LogFileName=test-results.trx" \
                      --results-directory "$PWD/test-results" \
                      | tee ../test-results/test-output.log
                    test_exit_code=${PIPESTATUS[0]}
                    set -e
                    cp -a test-results/. ../test-results/
                    trx_file="$(find ../test-results -name '*.trx' | head -n 1)"
                    if [ -z "$trx_file" ]; then
                      echo "No TRX result file was generated." | tee ../test-results/test-summary.txt
                      exit 1
                    fi
                    python3 - "$trx_file" > ../test-results/test-summary.txt <<'PY'
                    import sys
                    import xml.etree.ElementTree as ET
                    trx_file = sys.argv[1]
                    root = ET.parse(trx_file).getroot()
                    ns = {"trx": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
                    counters = root.find(".//trx:Counters", ns)
                    total = counters.get("total", "0") if counters is not None else "0"
                    passed = counters.get("passed", "0") if counters is not None else "0"
                    failed = counters.get("failed", "0") if counters is not None else "0"
                    skipped = counters.get("notExecuted", "0") if counters is not None else "0"
                    print(f"Total tests: {total}")
                    print(f"Passed: {passed}")
                    print(f"Failed: {failed}")
                    print(f"Skipped: {skipped}")
                    failed_results = root.findall(".//trx:UnitTestResult[@outcome='Failed']", ns)
                    if failed_results:
                        print()
                        print("Failed tests:")
                    for result in failed_results:
                        test_name = result.get("testName", "Unknown test")
                        message = result.findtext(".//trx:Message", default="", namespaces=ns).strip()
                        stack_trace = result.findtext(".//trx:StackTrace", default="", namespaces=ns).strip()
                        print(f"- {test_name}")
                        if message:
                            print(f"  Reason: {message}")
                        if stack_trace:
                            first_stack_line = stack_trace.splitlines()[0]
                            print(f"  Location: {first_stack_line}")
                    PY
                    cat ../test-results/test-summary.txt
                    echo "$test_exit_code" > ../test-results/test-exit-code.txt
                    if [ -d Tests/allure-report ]; then
                      cp -a Tests/allure-report/. ../allure-report/
                    elif [ -d allure-report ]; then
                      cp -a allure-report/. ../allure-report/
                    else
                      echo "Allure HTML report was not generated." | tee ../allure-report/report-status.txt
                    fi
                    exit 0

          - task: package-allure-report-for-xray
            config:
              platform: linux
              image_resource:
                type: registry-image
                source:
                  repository: alpine
                  tag: "3.20"
              inputs:
                - name: source-metadata
                - name: test-results
                - name: allure-report
              outputs:
                - name: xray-report-artifact
              run:
                path: sh
                args:
                  - -exc
                  - |
                    mkdir -p xray-report-artifact/allure-report
                    cp -a allure-report/. xray-report-artifact/allure-report/
                    cp source-metadata/source-version.txt xray-report-artifact/
                    cp source-metadata/commit-summary.txt xray-report-artifact/
                    cp test-results/test-summary.txt xray-report-artifact/
                    cp test-results/test-output.log xray-report-artifact/
                    cd xray-report-artifact
                    tar -czf allure-report-for-xray.tar.gz allure-report source-version.txt commit-summary.txt test-summary.txt test-output.log
                    {
                      echo "Artifact: allure-report-for-xray.tar.gz"
                      echo "Purpose: Attach this archive to the Jira Xray test execution task."
                      echo "Contents:"
                      echo "- Allure HTML report"
                      echo "- source-version.txt"
                      echo "- commit-summary.txt"
                      echo "- test-summary.txt"
                      echo "- test-output.log"
                    } | tee xray-upload-instructions.txt

          - task: evaluate-test-status
            config:
              platform: linux
              image_resource:
                type: registry-image
                source:
                  repository: alpine
                  tag: "3.20"
              inputs:
                - name: test-results
              run:
                path: sh
                args:
                  - -exc
                  - |
                    cat test-results/test-summary.txt
                    test_exit_code="$(cat test-results/test-exit-code.txt)"
                    if [ "$test_exit_code" -ne 0 ]; then
                      echo "One or more tests failed."
                      exit "$test_exit_code"
                    fi
                    echo "All tests passed."
        on_failure:
          do:
            - task: notify-failure
              config:
                platform: linux
                image_resource:
                  type: registry-image
                  source:
                    repository: alpine
                    tag: "3.20"
                run:
                  path: sh
                  args:
                    - -c
                    - echo "Pipeline FAILED — check Concourse build logs."
        on_success:
          do:
            - task: notify-success
              config:
                platform: linux
                image_resource:
                  type: registry-image
                  source:
                    repository: alpine
                    tag: "3.20"
                run:
                  path: sh
                  args:
                    - -c
                    - echo "Pipeline PASSED — all tests green."

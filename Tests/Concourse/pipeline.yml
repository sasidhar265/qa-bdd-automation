resources:
  - name: daily-schedule
    type: time
    source:
      interval: ((daily_schedule_interval))
      start_after: ((daily_schedule_start_after))
      location: ((daily_schedule_timezone))

  - name: repo
    type: git
    source:
      uri: ((git_repo_uri))
      branch: ((main_branch))
      
  - name: feature-repo
    type: git
    source:
      uri: ((git_repo_uri))
      branch: ((feature_branch))

jobs:
  - name: scheduler
    plan:
      - get: daily-schedule
        trigger: true

  - name: run-tests
    plan:
      - get: daily-schedule
        trigger: true
        passed:
          - scheduler

      - get: repo
        trigger: true

      - &source_metadata_task
        task: source-metadata
        file: repo/Tests/Concourse/tasks/source-metadata.yml

      - &install_deps_task
        task: install-deps
        file: repo/Tests/Concourse/tasks/install-deps.yml

      - &build_task
        task: build
        file: repo/Tests/Concourse/tasks/build.yml

      - &test_task
        task: test
        file: repo/Tests/Concourse/tasks/test.yml

      - &package_xray_task
        task: package-xray
        file: repo/Tests/Concourse/tasks/package-xray.yml

      - &publish_report_task
        task: publish-report
        file: repo/Tests/Concourse/tasks/publish-report.yml
        params:
          ARTIFACT_INTERNAL_BASE_URL: ((artifact_internal_base_url))
          ARTIFACT_PUBLIC_BASE_URL: ((artifact_public_base_url))

      - &evaluate_status_task
        task: evaluate-status
        file: repo/Tests/Concourse/tasks/evaluate-status.yml

  - name: run-feature-tests
    plan:
      - get: repo
        resource: feature-repo
        trigger: true

      - task: github-status-pending
        file: &github_status_task_file repo/Tests/Concourse/tasks/github-status.yml
        params:
          <<: &github_status_base_params
            GITHUB_TOKEN: ((github_status_token))
          GITHUB_STATUS_STATE: pending
          GITHUB_STATUS_DESCRIPTION: QA deployment checks are running.

      - do:
          - *source_metadata_task
          - *install_deps_task
          - *build_task
          - *test_task
          - *package_xray_task
          - *publish_report_task
          - *evaluate_status_task
        on_success:
          task: github-status-success
          file: *github_status_task_file
          params:
            <<: *github_status_base_params
            GITHUB_STATUS_STATE: success
            GITHUB_STATUS_DESCRIPTION: QA deployment checks passed.
        on_failure:
          task: github-status-failure
          file: *github_status_task_file
          params:
            <<: *github_status_base_params
            GITHUB_STATUS_STATE: failure
            GITHUB_STATUS_DESCRIPTION: QA deployment checks failed.

  - name: send-email
    plan:
      - get: daily-schedule
        trigger: true
        passed:
          - run-tests

      - get: repo
        passed:
          - run-tests

      - task: send-email
        file: repo/Tests/Concourse/tasks/send-email.yml
        params:
          SMTP_HOST: ((smtp_host))
          SMTP_PORT: ((smtp_port))
          SMTP_USERNAME: ((smtp_username))
          SMTP_PASSWORD: ((smtp_password))
          EMAIL_FROM: ((email_from))
          EMAIL_TO: sasidhar265@gmail.com
          ARTIFACT_INTERNAL_BASE_URL: ((artifact_internal_base_url))
          ARTIFACT_PUBLIC_BASE_URL: ((artifact_public_base_url))

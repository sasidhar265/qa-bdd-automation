resources:
  - name: repo
    type: git
    source:
      uri: https://github.com/sasidhar265/qa-bdd-automation.git
      branch: main

jobs:
  - name: run-tests
    plan:
      - get: repo
        trigger: true
        version: every

      - task: run-tests
        file: repo/Tests/Concourse/run_tests.yml
        params:
          SMTP_HOST: ((smtp_host))
          SMTP_PORT: ((smtp_port))
          SMTP_USERNAME: ((smtp_username))
          SMTP_PASSWORD: ((smtp_password))
          EMAIL_FROM: ((email_from))
          EMAIL_TO: sasidhar265@gmail.com

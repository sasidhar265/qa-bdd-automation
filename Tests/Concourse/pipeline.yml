resources:
  - name: daily-schedule
    type: time
    source:
      interval: ((daily_schedule_interval))
      start_after: ((daily_schedule_start_after))
      location: ((daily_schedule_timezone))

  - name: repo
    type: git
    source:
      uri: ((git_repo_uri))
      branch: ((main_branch))

  - name: feature-repo
    type: git
    source:
      uri: ((git_repo_uri))
      branch: ((feature_branch))

jobs:
  - name: run-tests
    plan:
      - get: daily-schedule
        trigger: true

      - get: repo
        version: every

      - task: source-metadata
        file: repo/Tests/Concourse/tasks/source-metadata.yml

      - task: install-deps
        file: repo/Tests/Concourse/tasks/install-deps.yml

      - task: build
        file: repo/Tests/Concourse/tasks/build.yml

      - task: test
        file: repo/Tests/Concourse/tasks/test.yml

      - task: package-xray
        file: repo/Tests/Concourse/tasks/package-xray.yml

      - task: publish-report
        file: repo/Tests/Concourse/tasks/publish-report.yml

      - task: evaluate-status
        file: repo/Tests/Concourse/tasks/evaluate-status.yml

  - name: run-feature-branch-tests
    plan:
      - get: repo
        resource: feature-repo
        trigger: true
        version: every

      - task: source-metadata
        file: repo/Tests/Concourse/tasks/source-metadata.yml

      - task: install-deps
        file: repo/Tests/Concourse/tasks/install-deps.yml

      - task: build
        file: repo/Tests/Concourse/tasks/build.yml

      - task: test
        file: repo/Tests/Concourse/tasks/test.yml

      - task: package-xray
        file: repo/Tests/Concourse/tasks/package-xray.yml

      - task: publish-report
        file: repo/Tests/Concourse/tasks/publish-report.yml

      - task: evaluate-status
        file: repo/Tests/Concourse/tasks/evaluate-status.yml

  - name: send-email
    plan:
      - get: daily-schedule
        trigger: true
        passed:
          - run-tests

      - get: repo
        passed:
          - run-tests

      - task: send-email
        file: repo/Tests/Concourse/tasks/send-email.yml
        params:
          SMTP_HOST: ((smtp_host))
          SMTP_PORT: ((smtp_port))
          SMTP_USERNAME: ((smtp_username))
          SMTP_PASSWORD: ((smtp_password))
          EMAIL_FROM: ((email_from))
          EMAIL_TO: ((email_to))
